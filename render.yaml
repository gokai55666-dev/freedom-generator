services:
  - type: web
    name: freedom-bridge
    runtime: docker
    rootDir: bridge
    envVars:
      - key: AI_ENGINE_URL
        value: http://freedom-ai:10001
      - key: PORT
        value: 10000
    plan: free

  - type: web
    name: freedom-ai
    runtime: docker
    rootDir: ai-engine
    envVars:
      - key: PORT
        value: 10001
    plan: free
